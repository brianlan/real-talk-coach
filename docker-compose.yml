services:
  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
    expose:
      - "8000"
    volumes:
      - ./logs/backend:/var/log/app
    command: 'sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 2>&1 | tee -a /var/log/app/backend.log"'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ""
        NEXT_PUBLIC_WS_BASE: ""
        NEXT_PUBLIC_ADMIN_TOKEN: ${NEXT_PUBLIC_ADMIN_TOKEN:-}
    environment:
      API_BASE_INTERNAL: http://backend:8000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const https=require('https');const http=require('http');const url='http://localhost:3000/';const req=http.get||https.get;req(url,(res)=>{process.exit(res.statusCode===200||res.statusCode===404||res.statusCode===301||res.statusCode===302||res.statusCode===307||res.statusCode===308?0:1)}).on('error',()=>{process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mongodb:
    image: mongo:4.4.23
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: real-talk-coach
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
  minio_data:
